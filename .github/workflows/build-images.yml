name: Build Changed Images

on:
  push:
    branches:
      - main
    paths:
      - '*/Dockerfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  detect:
    runs-on: ubuntu-latest
    if: github.server_url == 'https://github.com'
    outputs:
      images: ${{ steps.changed.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last successful commit
        id: last_success
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Detect changed images
        id: changed
        run: |
          # Diff between the last success and current HEAD
          BASE_SHA=${{ steps.last_success.outputs.base }}
          CHANGED=$(git diff --name-only $BASE_SHA HEAD | grep 'Dockerfile' | xargs -I{} dirname {} | jq -R . | jq -sc .)
          echo "images=$CHANGED" >> $GITHUB_OUTPUT

  build:
    needs: detect
    if: github.server_url == 'https://github.com' && needs.detect.outputs.images != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.images) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Owner Name
        id: owner_name
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image }}
          file: ${{ matrix.image }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner_name.outputs.owner }}/${{ matrix.image }}:latest

