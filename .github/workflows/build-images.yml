name: Build Changed Images

on:
  push:
    branches:
      - main
    paths:
      - '*/Dockerfile'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    if: github.server_url == 'https://github.com'
    outputs:
      images: ${{ steps.changed.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed images
        id: changed
        run: |
          if git rev-parse ci/last-success >/dev/null 2>&1; then
            BASE=$(git rev-parse ci/last-success)
          else
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          CHANGED=$(git diff --name-only $BASE HEAD | grep 'Dockerfile' | xargs -I{} dirname {} | jq -R . | jq -sc .)
          echo "images=$CHANGED" >> $GITHUB_OUTPUT

  build:
    needs: detect
    if: github.server_url == 'https://github.com' && needs.detect.outputs.images != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.images) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image }}
          file: ${{ matrix.image }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:latest

  tag-success:
    needs: build
    if: github.server_url == 'https://github.com' && success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update last-success tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f ci/last-success
          git push origin -f refs/tags/ci/last-success